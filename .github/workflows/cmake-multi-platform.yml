# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    # branches: [ "main" ]
  pull_request:
    # branches: [ "main" ]
  workflow_dispatch: # Enables manual workflow triggering

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      # All include combinations are processed after exclude. This allows you to use include to add back combinations that were previously excluded.
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          #- os: ubuntu-latest
          #  c_compiler: clang
          #  cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Cache vcpkg and its libraries for ubuntu
      id: cache-vcpkg-ubuntu
      if: matrix.os == 'ubuntu-latest'
      uses: actions/cache@v3
      with:
        path: /usr/local/share/vcpkg/installed/
        key: ${{ matrix.os }}-vcpkg-${{ hashFiles('./.github/workflows/vcpkg_ubuntu.sh') }}

    - name: Cache vcpkg and its libraries for windows
      id: cache-vcpkg-windows
      if: matrix.os == 'windows-latest'
      uses: actions/cache@v3
      with:
        path: C:\vcpkg\installed\
        key: ${{ matrix.os }}-vcpkg-${{ hashFiles('./.github/workflows/vcpkg_windows.ps1') }}

    - name: Install vcpkg dependencies on ubuntu
      if: (matrix.os == 'ubuntu-latest') && (steps.cache-vcpkg-ubuntu.outputs.cache-hit != 'true')
      run: ./.github/workflows/vcpkg_ubuntu.sh

    - name: Install vcpkg dependencies on windows
      if: (matrix.os == 'windows-latest') && (steps.cache-vcpkg-windows.outputs.cache-hit != 'true')
      run: .\.github\workflows\vcpkg_windows.ps1

    - name: List vcpkg
      run: echo $GITHUB_OUTPUT

    - name: List vcpkg
      run: vcpkg list

    - name: Show vcpkg folder structure
      run: cd /usr/local/share/vcpkg && ls -la

    - name: Configure CMake Ubuntu
      if: matrix.os == 'ubuntu-latest'
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE=/usr/local/share/vcpkg/scripts/buildsystems/vcpkg.cmake
        -S ${{ github.workspace }}

    - name: Configure CMake Windows
      if: matrix.os == 'windows-latest'
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ github.workspace }}\build
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }}

