name: Docker Image CI

on:
  push:
    branches: [ "17-add-ci-for-linux" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build the Docker image
      run: cd .devcontainer && docker build . --file Dockerfile --tag 3d-nonrigid-tricubic-pointcloud-registration:$(date +%s)
